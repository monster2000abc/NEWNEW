<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>REACT — 身体反応ゲーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap');
  :root{
    --cyan:#00f5ff;--pink:#ff0080;--yellow:#ffe600;--green:#00ff88;
    --dark:#050510;--panel:rgba(5,5,20,0.88);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--dark);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;
    font-family:'Noto Sans JP',sans-serif;
    overflow:hidden;user-select:none;
  }

  /* video は画面外に追いやる（display:none はフレーム停止の原因になるため使わない） */
  #vid{
    position:fixed;
    left:-9999px;top:-9999px;
    width:640px;height:480px;
  }

  #wrap{
    position:relative;
    width:min(640px,100vw);
    aspect-ratio:4/3;
  }
  #cvs{
    display:block;width:100%;height:100%;
    border-radius:4px;
    border:1px solid rgba(0,245,255,0.2);
    box-shadow:0 0 40px rgba(0,245,255,0.08);
  }

  /* HUD */
  #hud{
    position:absolute;top:0;left:0;right:0;
    display:flex;justify-content:space-between;
    padding:10px 12px;pointer-events:none;gap:8px;
  }
  .hbox{
    background:var(--panel);border:1px solid rgba(0,245,255,0.3);
    border-radius:4px;padding:4px 12px;backdrop-filter:blur(8px);
  }
  .hlabel{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--cyan);opacity:.7;}
  .hval{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;line-height:1.1;}
  #htimer .hval{color:var(--pink);}
  #hcombo .hval{color:var(--yellow);}

  #tbar{
    position:absolute;bottom:0;left:0;height:3px;
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    transition:width 1s linear;
    box-shadow:0 0 10px var(--cyan);
  }

  /* Screens */
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(5,5,16,0.93);
    border-radius:4px;gap:14px;
    backdrop-filter:blur(4px);
  }
  .stitle{
    font-family:'Orbitron',monospace;
    font-size:clamp(22px,5vw,34px);font-weight:900;
    color:#fff;letter-spacing:4px;
    text-shadow:0 0 20px var(--cyan),0 0 60px var(--cyan);
  }
  .ssub{font-size:13px;color:rgba(255,255,255,.72);text-align:center;line-height:2;max-width:340px;}
  .badge{
    display:inline-block;
    background:rgba(0,245,255,0.12);border:1px solid rgba(0,245,255,0.4);
    color:var(--cyan);font-size:11px;padding:3px 14px;
    border-radius:20px;letter-spacing:1px;
  }
  .btn{
    font-family:'Orbitron',monospace;font-size:16px;font-weight:700;
    letter-spacing:3px;text-transform:uppercase;
    background:transparent;border:2px solid var(--cyan);
    color:var(--cyan);padding:12px 40px;border-radius:4px;
    cursor:pointer;position:relative;overflow:hidden;transition:all .2s;
  }
  .btn::before{
    content:'';position:absolute;inset:0;background:var(--cyan);
    transform:scaleX(0);transform-origin:left;transition:transform .2s;z-index:-1;
  }
  .btn:hover::before{transform:scaleX(1);}
  .btn:hover{color:var(--dark);box-shadow:0 0 20px var(--cyan);}
  .btn:active{transform:scale(.97);}
  #rscore{
    font-family:'Orbitron',monospace;
    font-size:clamp(48px,10vw,72px);font-weight:900;
    color:var(--yellow);text-shadow:0 0 30px var(--yellow);
  }

  #slog{font-size:12px;color:rgba(255,255,255,.55);text-align:center;max-width:300px;line-height:2;}
  .spin{
    width:36px;height:36px;
    border:3px solid rgba(0,245,255,.2);
    border-top-color:var(--cyan);border-radius:50%;
    animation:sp .7s linear infinite;
  }
  @keyframes sp{to{transform:rotate(360deg);}}

  /* 検出部位の凡例 */
  #legend{
    display:flex;gap:16px;font-size:11px;
    color:rgba(255,255,255,.6);
    background:rgba(0,0,0,.4);
    border-radius:4px;padding:4px 12px;
  }
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;}
</style>
</head>
<body>

<video id="vid" autoplay playsinline muted></video>

<div id="wrap">
  <canvas id="cvs"></canvas>

  <div id="hud">
    <div class="hbox"><div class="hlabel">SCORE</div><div class="hval" id="vscore">0</div></div>
    <div class="hbox" id="htimer"><div class="hlabel">TIME</div><div class="hval" id="vtime">60</div></div>
    <div class="hbox" id="hcombo"><div class="hlabel">COMBO</div><div class="hval" id="vcombo">×1</div></div>
  </div>
  <div id="tbar" style="width:100%"></div>

  <!-- Loading -->
  <div class="screen" id="sload">
    <div class="spin"></div>
    <div id="slog">初期化中…</div>
  </div>

  <!-- Start -->
  <div class="screen" id="sstart" style="display:none">
    <div class="badge">BODY REACTION GAME</div>
    <div class="stitle">REACT</div>
    <div class="ssub">
      カメラに映った自分の<br>
      <strong style="color:#fff">✋ 左手首 &nbsp;／&nbsp; 右手首 &nbsp;／&nbsp; 🗣 頭（鼻）</strong><br>
      でターゲットに触れてポイントを稼ごう！<br>
      制限時間 <strong style="color:var(--yellow)">60秒</strong>
    </div>
    <div id="legend">
      <span><span class="dot" style="background:#00ff88"></span>頭</span>
      <span><span class="dot" style="background:#ff0080"></span>左手首</span>
      <span><span class="dot" style="background:#00f5ff"></span>右手首</span>
    </div>
    <button class="btn" id="btnstart">START</button>
  </div>

  <!-- Result -->
  <div class="screen" id="sresult" style="display:none">
    <div class="badge">GAME OVER</div>
    <div class="stitle">RESULT</div>
    <div id="rscore">0</div>
    <div class="ssub" id="rmsg"></div>
    <button class="btn" id="btnretry">RETRY</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  Script loader
// ════════════════════════════════════════════════
function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}
function log(m){ document.getElementById('slog').innerHTML=m; }

// ════════════════════════════════════════════════
//  Constants
// ════════════════════════════════════════════════
const CW=640, CH=480;
const T_R=46, T_MAX=3, T_LIFE=2800, GDUR=60;

// 検出するキーポイント: [MoveNet index, 表示色, 当たり半径ボーナス]
const KP_DEF = [
  [0,  '#00ff88', 20],   // 鼻（頭）
  [9,  '#ff0080', 16],   // 左手首
  [10, '#00f5ff', 16],   // 右手首
];

// ════════════════════════════════════════════════
//  DOM
// ════════════════════════════════════════════════
const vid = document.getElementById('vid');
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
cvs.width=CW; cvs.height=CH;

// ════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════
let detector=null;
let running=false, score=0, combo=1, timeLeft=GDUR, timerID=null;
let targets=[], pops=[], recentHit=0;

// ════════════════════════════════════════════════
//  Camera — 4段階フォールバック
// ════════════════════════════════════════════════
async function startCamera(){
  async function tryStream(constraints){
    const s=await navigator.mediaDevices.getUserMedia(constraints);
    vid.srcObject=s;
    await new Promise((res,rej)=>{
      vid.oncanplay=res;
      vid.onerror=rej;
      setTimeout(()=>rej(new Error('timeout')),8000);
    });
    await vid.play();
    // 実フレームが来るまで待機
    await new Promise(res=>{
      const chk=()=>vid.readyState>=3?res():setTimeout(chk,100);
      chk();
    });
  }

  // ① デバイス一覧からフロントカメラを探す
  try{
    const devs=await navigator.mediaDevices.enumerateDevices();
    const cams=devs.filter(d=>d.kind==='videoinput');
    const front=cams.find(c=>/(front|user|前|facetime|selfie)/i.test(c.label));
    if(front?.deviceId){
      await tryStream({video:{deviceId:{exact:front.deviceId}},audio:false});
      return;
    }
  }catch(_){}

  // ② exact facingMode:'user'
  try{ await tryStream({video:{facingMode:{exact:'user'}},audio:false}); return; }catch(_){}

  // ③ facingMode:'user' ヒント
  try{ await tryStream({video:{facingMode:'user'},audio:false}); return; }catch(_){}

  // ④ 制約なし（デフォルト）
  await tryStream({video:true,audio:false});
}

// ════════════════════════════════════════════════
//  Targets
// ════════════════════════════════════════════════
class Target{
  constructor(){
    const m=T_R+12;
    this.x=m+Math.random()*(CW-m*2);
    this.y=m+Math.random()*(CH-m*2);
    this.born=performance.now();
    this.dead=false;
    this.hue=Math.floor(Math.random()*360);
  }
  get age(){ return performance.now()-this.born; }
  get ratio(){ return Math.min(this.age/T_LIFE,1); }
  get expired(){ return this.age>T_LIFE; }
}

// ════════════════════════════════════════════════
//  Hit detection
// ════════════════════════════════════════════════
function tryHit(mx,my,extraR){
  const now=performance.now();
  targets.forEach(t=>{
    if(t.dead) return;
    if(Math.hypot(mx-t.x,my-t.y)<T_R+extraR){
      t.dead=true;
      const pts=Math.max(5,Math.round(20*combo*(1-t.ratio*.7)));
      score+=pts;
      combo=(now-recentHit<1500)?Math.min(+(combo+.5).toFixed(1),5):1;
      recentHit=now;
      pops.push({x:t.x,y:t.y,pts,born:now,color:`hsl(${t.hue},100%,65%)`});
      updateHUD();
    }
  });
}

// ════════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════════
function updateHUD(){
  document.getElementById('vscore').textContent=score;
  document.getElementById('vtime').textContent=timeLeft;
  document.getElementById('vcombo').textContent='×'+combo.toFixed(1);
}

// ════════════════════════════════════════════════
//  Game lifecycle
// ════════════════════════════════════════════════
document.getElementById('btnstart').onclick=startGame;
document.getElementById('btnretry').onclick=startGame;

function startGame(){
  document.getElementById('sstart').style.display='none';
  document.getElementById('sresult').style.display='none';
  score=0;combo=1;timeLeft=GDUR;targets=[];pops=[];running=true;
  updateHUD();
  document.getElementById('tbar').style.width='100%';
  timerID=setInterval(()=>{
    timeLeft--;
    document.getElementById('vtime').textContent=timeLeft;
    document.getElementById('tbar').style.width=(timeLeft/GDUR*100)+'%';
    if(timeLeft<=0) endGame();
  },1000);
}

function endGame(){
  running=false;clearInterval(timerID);targets=[];
  const msg=score>=500?'🏆 圧巻のプレイ！':
            score>=300?'🔥 すごい反射神経！':
            score>=150?'👍 なかなかいい感じ！':'💪 次はもっといける！';
  document.getElementById('rscore').textContent=score;
  document.getElementById('rmsg').textContent=msg;
  document.getElementById('sresult').style.display='flex';
}

// ════════════════════════════════════════════════
//  Render loop
// ════════════════════════════════════════════════
async function renderLoop(){
  const now=performance.now();

  // カメラ映像をミラー描画
  if(vid.readyState>=2 && vid.videoWidth>0){
    ctx.save();
    ctx.translate(CW,0); ctx.scale(-1,1);
    ctx.drawImage(vid,0,0,CW,CH);
    ctx.restore();
  } else {
    ctx.fillStyle='#08081a';
    ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.font='14px Noto Sans JP';
    ctx.textAlign='center';
    ctx.fillText('カメラ映像を待機中…',CW/2,CH/2);
  }

  // ビネット
  const vg=ctx.createRadialGradient(CW/2,CH/2,CH*.3,CW/2,CH/2,CH*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,8,0.5)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,CW,CH);

  if(running){
    // ターゲット生成
    targets=targets.filter(t=>!t.expired||t.dead);
    while(targets.length<T_MAX) targets.push(new Target());

    // ── ポーズ検出 ──
    if(detector && vid.readyState>=2 && vid.videoWidth>0){
      try{
        const poses=await detector.estimatePoses(vid);
        if(poses.length>0){
          const kps=poses[0].keypoints;
          const scaleX=CW/(vid.videoWidth||CW);
          const scaleY=CH/(vid.videoHeight||CH);

          KP_DEF.forEach(([id,col,extraR])=>{
            const kp=kps[id];
            if(!kp||kp.score<0.3) return;

            // ミラー補正（映像を左右反転して描いているため x も反転）
            const mx=CW - kp.x*scaleX;
            const my=kp.y*scaleY;

            // ヒット判定
            tryHit(mx,my,extraR);

            // 外側グロー
            ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2);
            ctx.fillStyle=col+'33'; ctx.fill();
            // 内側ドット
            ctx.beginPath(); ctx.arc(mx,my,10,0,Math.PI*2);
            ctx.fillStyle=col;
            ctx.shadowColor=col; ctx.shadowBlur=18; ctx.fill(); ctx.shadowBlur=0;
            // 十字線
            ctx.strokeStyle=col+'cc'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.moveTo(mx-18,my); ctx.lineTo(mx+18,my); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(mx,my-18); ctx.lineTo(mx,my+18); ctx.stroke();
          });
        }
      }catch(_){}
    }

    // ── ターゲット描画 ──
    targets.forEach(t=>{
      if(t.dead) return;
      const pulse=0.88+Math.sin(now*.009)*.12;
      const hsl=`hsl(${t.hue},100%,60%)`;
      ctx.save(); ctx.translate(t.x,t.y);

      // 外周タイムリング
      ctx.beginPath();
      ctx.arc(0,0,T_R+5,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-t.ratio),false);
      ctx.strokeStyle=hsl; ctx.lineWidth=5;
      ctx.shadowColor=hsl; ctx.shadowBlur=16; ctx.stroke(); ctx.shadowBlur=0;

      // 内側円
      const gr=ctx.createRadialGradient(0,0,0,0,0,T_R*.65);
      gr.addColorStop(0,hsl+'ee'); gr.addColorStop(1,`hsl(${t.hue},100%,35%)`+'99');
      ctx.beginPath(); ctx.arc(0,0,T_R*.65*pulse,0,Math.PI*2);
      ctx.fillStyle=gr; ctx.fill();

      // 十字
      ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-16,0); ctx.lineTo(16,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(0,16); ctx.stroke();
      ctx.restore();
    });

    // ── スコアポップ ──
    pops=pops.filter(p=>now-p.born<900);
    pops.forEach(p=>{
      const age=now-p.born;
      ctx.save(); ctx.globalAlpha=1-age/900;
      ctx.font=`900 ${18+age*.025}px 'Orbitron',monospace`;
      ctx.textAlign='center';
      ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=10;
      ctx.fillText(`+${p.pts}`,p.x,p.y-age*.08);
      ctx.restore();
    });

    // コンボリセット
    if(combo>1 && now-recentHit>2000){
      combo=1;
      document.getElementById('vcombo').textContent='×1.0';
    }
  }

  requestAnimationFrame(renderLoop);
}

// ════════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════════
async function init(){
  // Step1: カメラ
  log('📷 カメラを起動中…');
  try{
    await startCamera();
    log('✅ カメラ OK<br>🧠 AIモデルを読み込み中…<br><small>（初回は20〜30秒かかる場合があります）</small>');
  }catch(e){
    log(`❌ カメラを取得できませんでした。<br>
      <small style="color:#ff8888">${e.message}</small><br><br>
      ブラウザのアドレスバーでカメラを「許可」にして<br>ページをリロードしてください。`);
    return; // カメラなしでは起動しない
  }

  // Step2: TensorFlow.js + MoveNet
  try{
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js');
    log('✅ TensorFlow.js 読み込み完了<br>🔍 ポーズ検出モデルを準備中…');
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js');
    detector=await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
    );
    log('✅ AIモデル準備完了！');
  }catch(e){
    log(`❌ AIモデルの読み込みに失敗しました。<br>
      <small style="color:#ff8888">インターネット接続を確認してリロードしてください。</small>`);
    return;
  }

  // 少し待ってからスタート画面へ
  await new Promise(r=>setTimeout(r,400));
  document.getElementById('sload').style.display='none';
  document.getElementById('sstart').style.display='flex';

  renderLoop();
}

init();
</script>
</body>
</html>
